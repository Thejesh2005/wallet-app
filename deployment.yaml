apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-app
  template:
    metadata:
      labels:
        app: wallet-app
    spec:
      containers:
      - name: wallet-app
        image: thejeshrv/wallet-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
spec:
  type: NodePort
  selector:
    app: wallet-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30012